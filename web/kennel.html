<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kennel — ESCR Registry Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  background: #f1f3f4;
  color: #202124;
  min-height: 100vh;
}

header {
  background: #1a73e8;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
header a { color: #fff; text-decoration: none; font-size: 13px; opacity: 0.85; }
header a:hover { opacity: 1; text-decoration: underline; }
header h1 { font-size: 18px; font-weight: 600; }

main { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

.mast {
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
  padding: 24px 28px;
  margin-bottom: 20px;
}
.mast-name { font-size: 26px; font-weight: 700; }

.section {
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}
.section-head {
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: #5f6368; padding: 12px 20px; border-bottom: 1px solid #f1f3f4; background: #f8f9fa;
}
.section-body { padding: 0; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 8px 16px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  color: #5f6368; background: #f8f9fa; border-bottom: 1px solid #dadce0;
}
.data-table td { padding: 9px 16px; font-size: 13px; border-bottom: 1px solid #f1f3f4; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover { background: #f8f9fa; }
.data-table a { color: #1a73e8; text-decoration: none; }
.data-table a:hover { text-decoration: underline; }

.owner-group { }
.owner-row td { background: #f8f9fa; font-weight: 600; border-top: 1px solid #dadce0; }
.dog-row td { padding-left: 32px; }

.error-box { text-align: center; padding: 60px 20px; color: #5f6368; font-size: 15px; }
.loading   { text-align: center; padding: 60px 20px; color: #80868b; }
</style>
</head>
<body>

<header>
  <a href="index.html">← Search</a>
  <h1 id="page-title">Kennel</h1>
</header>

<main id="main">
  <div class="loading">Loading…</div>
</main>

<script>
"use strict";

const params   = new URLSearchParams(location.search);
const kennelId = parseInt(params.get('id') || '0', 10);

if (!kennelId) {
    document.getElementById('main').innerHTML = '<div class="error-box">No kennel ID specified.</div>';
} else {
    fetch('api.php?type=kennel&id=' + kennelId)
        .then(r => r.json())
        .then(render)
        .catch(() => {
            document.getElementById('main').innerHTML =
                '<div class="error-box">Failed to load — check server connection.</div>';
        });
}

function render(data) {
    if (data.error) {
        document.getElementById('main').innerHTML = `<div class="error-box">${esc(data.error)}</div>`;
        return;
    }

    const { kennel, members, dogs } = data;
    document.title = kennel.name + ' — ESCR Registry Explorer';
    document.getElementById('page-title').textContent = kennel.name;

    let html = `<div class="mast"><div class="mast-name">${esc(kennel.name)}</div></div>`;

    // ── Members ───────────────────────────────────────────────────────
    if (members.length) {
        let rows = '';
        for (const m of members) {
            const name = [m.givenName, m.familyName].filter(Boolean).join(' ') || '(unnamed)';
            const breeder = m.isBreederText === 'Yes' ? 'Yes' : (m.isBreederText || '—');
            rows += `<tr>
                <td><a href="person.html?id=${m.id}">${esc(name)}</a></td>
                <td>${esc(breeder)}</td>
                <td>${m.dogsOwned}</td>
            </tr>`;
        }
        html += `<div class="section">
            <div class="section-head">Members <span style="font-weight:400;color:#5f6368">(${members.length})</span></div>
            <div class="section-body">
                <table class="data-table">
                    <thead><tr><th>Name</th><th>Breeder</th><th>Dogs Owned</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </div>`;
    }

    // ── Dogs — grouped by owner ───────────────────────────────────────
    if (dogs.length) {
        // Group by ownerId
        const byOwner = new Map();
        for (const d of dogs) {
            if (!byOwner.has(d.ownerId)) {
                byOwner.set(d.ownerId, { ownerId: d.ownerId, ownerName: d.ownerName, dogs: [] });
            }
            byOwner.get(d.ownerId).dogs.push(d);
        }

        let rows = '';
        for (const g of byOwner.values()) {
            const ownerLink = g.ownerId
                ? `<a href="person.html?id=${g.ownerId}">${esc(g.ownerName || '(unnamed)')}</a>`
                : '—';
            rows += `<tr class="owner-row">
                <td colspan="5">${ownerLink} <span style="font-weight:400;color:#5f6368">(${g.dogs.length})</span></td>
            </tr>`;
            for (const d of g.dogs) {
                rows += `<tr class="dog-row">
                    <td><a href="dog.html?id=${d.id}">${esc(d.name || '(unnamed)')}</a></td>
                    <td>${esc(d.registrationNumber || '—')}</td>
                    <td>${esc(d.sex || '—')}</td>
                    <td>${esc(d.coatColor || '—')}</td>
                    <td>${fmtDate(d.dateOfWhelp) || '—'}</td>
                </tr>`;
            }
        }

        html += `<div class="section">
            <div class="section-head">Dogs <span style="font-weight:400;color:#5f6368">(${dogs.length})</span></div>
            <div class="section-body">
                <table class="data-table">
                    <thead><tr><th>Name</th><th>Reg #</th><th>Sex</th><th>Coat Color</th><th>Born</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        </div>`;
    }

    if (!members.length && !dogs.length) {
        html += '<div class="error-box" style="padding:32px">No members or dogs on record for this kennel.</div>';
    }

    document.getElementById('main').innerHTML = html;
}

function fmtDate(s) {
    if (!s) return null;
    const d = s.split('T')[0].split(' ')[0];
    if (!d || d === '0000-00-00') return null;
    const [y, m, day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m,10)-1]} ${parseInt(day,10)}, ${y}`;
}

function esc(s) {
    return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
