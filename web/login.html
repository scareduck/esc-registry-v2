<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — ESCR Registry Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  background: #f1f3f4;
  color: #202124;
  min-height: 100vh;
}

header {
  background: #1a73e8;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
header a { color: #fff; text-decoration: none; font-size: 13px; opacity: 0.85; }
header a:hover { opacity: 1; text-decoration: underline; }
header h1 { font-size: 18px; font-weight: 600; }

main { max-width: 420px; margin: 60px auto; padding: 0 20px 80px; }

.card {
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
  overflow: hidden;
}
.card-head {
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: #5f6368; padding: 12px 20px; border-bottom: 1px solid #f1f3f4; background: #f8f9fa;
}
.card-body { padding: 20px; }

.form-label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase; color: #5f6368; margin-bottom: 4px;
}
.form-input {
  width: 100%; padding: 7px 10px; font-size: 13px; font-family: inherit;
  border: 1px solid #dadce0; border-radius: 6px; background: #fff; color: #202124;
  transition: border-color .15s;
}
.form-input:focus {
  outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15);
}
.form-group { margin-bottom: 14px; }

.btn-primary {
  width: 100%; background: #1a73e8; color: #fff; border: none; border-radius: 6px;
  padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-primary:hover:not(:disabled) { background: #1557b0; }
.btn-primary:disabled { background: #a8c7fa; cursor: not-allowed; }

.error-msg {
  background: #fce8e6; border: 1px solid #f5c6c2; border-radius: 6px;
  color: #d93025; font-size: 13px; padding: 8px 12px; margin-bottom: 14px; display: none;
}
</style>
</head>
<body>

<header>
  <a href="index.html">← Search</a>
  <h1>Sign In</h1>
</header>

<main>
  <div class="card">
    <div class="card-head">Registry Sign In</div>
    <div class="card-body">
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username"
                 autocomplete="username" autofocus spellcheck="false" autocapitalize="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 autocomplete="current-password">
        </div>
        <div class="error-msg" id="error-msg"></div>
        <button class="btn-primary" type="submit" id="submit-btn">Sign In</button>
      </form>
      <div style="margin-top:12px;text-align:center;font-size:13px;">
        <a href="forgot-password.html" style="color:#1a73e8;text-decoration:none;">Forgot password?</a>
      </div>
    </div>
  </div>
</main>

<script>
"use strict";

const params = new URLSearchParams(location.search);
const next   = params.get('next') || 'index.html';

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn      = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
        const r = await fetch('api.php?type=login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password}),
        }).then(r => r.json());

        if (r.ok) {
            location.href = next;
        } else {
            errorMsg.textContent = r.error || 'Sign in failed';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    } catch {
        errorMsg.textContent = 'Network error — please try again';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
});
</script>
</body>
</html>
