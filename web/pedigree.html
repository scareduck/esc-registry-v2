<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>5-Generation Pedigree — ESCR Registry Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  background: #f1f3f4;
  color: #202124;
  min-height: 100vh;
}

header {
  background: #1a73e8;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
header a { color: #fff; text-decoration: none; font-size: 13px; opacity: 0.85; }
header a:hover { opacity: 1; text-decoration: underline; }
header .sep { opacity: 0.4; }
header h1 { font-size: 18px; font-weight: 600; }

main { padding: 24px 16px 60px; }

/* ── Pedigree table ─────────────────────────────────────────────────── */

.ped-wrap {
  overflow-x: auto;
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
}

.ped-table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

.ped-table th {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #5f6368;
  background: #f8f9fa;
  border: 1px solid #dadce0;
  padding: 8px 12px;
  text-align: left;
  white-space: nowrap;
}

.ped-table td {
  border: 1px solid #dadce0;
  padding: 3px 10px;
  vertical-align: middle;
  height: 24px;
  min-width: 160px;
}

.ped-table td.ped-subject {
  min-width: 180px;
  font-weight: 700;
  font-size: 15px;
  background: #e8f0fe;
  border-color: #4285f4;
  vertical-align: middle;
}

.ped-table td a {
  color: #1a73e8;
  text-decoration: none;
  display: block;
  line-height: 1.3;
  white-space: nowrap;
}
.ped-table td a:hover { text-decoration: underline; }

.ped-reg {
  font-size: 11px;
  color: #80868b;
  font-family: monospace;
  display: block;
  line-height: 1.1;
}

.ped-empty {
  color: #bdc1c6;
  font-style: italic;
  font-size: 12px;
}

/* Subtle shading to distinguish sire/dam halves */
.sire-side { background: #fafeff; }
.dam-side  { background: #fffaf8; }

.error-box { text-align: center; padding: 60px 20px; color: #5f6368; font-size: 15px; }
.loading   { text-align: center; padding: 60px 20px; color: #80868b; }
</style>
</head>
<body>

<header>
  <a href="index.html">← Search</a>
  <span class="sep">|</span>
  <a id="dog-link" href="#">Dog Detail</a>
  <span class="sep">|</span>
  <h1 id="page-title">5-Generation Pedigree</h1>
  <a href="#" onclick="signOut();return false;" style="margin-left:auto">Sign out</a>
</header>

<main id="main">
  <div class="loading">Loading…</div>
</main>

<script>
"use strict";

async function signOut() {
    await fetch('api.php?type=logout', {method: 'POST'});
    location.href = 'login.html';
}

fetch('api.php?type=session').then(r=>r.json()).then(s=>{
    if(!s.loggedIn) location.href='login.html?next='+encodeURIComponent(location.pathname+location.search);
});

const params = new URLSearchParams(location.search);
const dogId  = parseInt(params.get('id') || '0', 10);

if (!dogId) {
    document.getElementById('main').innerHTML = '<div class="error-box">No dog ID specified.</div>';
} else {
    fetch('api.php?type=pedigree&id=' + dogId)
        .then(r => r.json())
        .then(render)
        .catch(() => {
            document.getElementById('main').innerHTML =
                '<div class="error-box">Failed to load — check server connection.</div>';
        });
}

function render({ dog, tree, error }) {
    if (error) {
        document.getElementById('main').innerHTML = `<div class="error-box">${esc(error)}</div>`;
        return;
    }

    const dogName = dog.name || '(unnamed)';
    document.title = dogName + ' — 5-Gen Pedigree — ESCR Registry Explorer';
    document.getElementById('page-title').textContent = dogName;
    const dogLink = document.getElementById('dog-link');
    dogLink.href        = 'dog.html?id=' + dog.id;
    dogLink.textContent = dogName;

    const heads = ['Subject', 'Parents', 'Grandparents', 'Great-grandparents', '4th Generation', '5th Generation'];
    const thead = '<thead><tr>' + heads.map(h => `<th>${esc(h)}</th>`).join('') + '</tr></thead>';

    document.getElementById('main').innerHTML =
        `<div class="ped-wrap">
            <table class="ped-table">
                ${thead}
                <tbody>${buildRows(tree)}</tbody>
            </table>
        </div>`;
}

// ── Table builder ─────────────────────────────────────────────────────
// Binary-tree positions: 1=subject, 2=sire, 3=dam, 4=SS, 5=SD, 6=DS, 7=DD, …
// 32 rows; sire side at top (rows 0-15), dam side at bottom (rows 16-31).
// Column order: Subject | Gen1 | Gen2 | Gen3 | Gen4 | Gen5

function buildRows(tree) {
    let html = '';
    for (let i = 0; i < 32; i++) {
        const sireSide = i < 16;
        const cls      = sireSide ? 'sire-side' : 'dam-side';
        html += '<tr>';
        if (i === 0)    html += cell(tree,  1,         32, 'ped-subject');
        if (i % 16 === 0) html += cell(tree, 2 + i/16, 16, cls);
        if (i % 8  === 0) html += cell(tree, 4 + i/8,   8, cls);
        if (i % 4  === 0) html += cell(tree, 8 + i/4,   4, cls);
        if (i % 2  === 0) html += cell(tree, 16 + i/2,  2, cls);
        html += cell(tree, 32 + i, 1, cls);
        html += '</tr>';
    }
    return html;
}

function cell(tree, pos, rowspan, cls) {
    const entry = tree[pos];
    if (!entry) {
        return `<td rowspan="${rowspan}" class="${cls}"><span class="ped-empty">—</span></td>`;
    }
    const nameStr = esc(entry.name || '(unnamed)');
    const regStr  = entry.reg ? `<span class="ped-reg">${esc(entry.reg)}</span>` : '';
    return `<td rowspan="${rowspan}" class="${cls}">` +
           `<a href="dog.html?id=${entry.id}">${nameStr}${regStr}</a>` +
           `</td>`;
}

function esc(s) {
    return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
