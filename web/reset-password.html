<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password — ESCR Registry Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  background: #f1f3f4;
  color: #202124;
  min-height: 100vh;
}

header {
  background: #1a73e8;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
header a { color: #fff; text-decoration: none; font-size: 13px; opacity: 0.85; }
header a:hover { opacity: 1; text-decoration: underline; }
header h1 { font-size: 18px; font-weight: 600; }

main { max-width: 420px; margin: 60px auto; padding: 0 20px 80px; }

.card {
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
  overflow: hidden;
}
.card-head {
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: #5f6368; padding: 12px 20px; border-bottom: 1px solid #f1f3f4; background: #f8f9fa;
}
.card-body { padding: 20px; }

.form-label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase; color: #5f6368; margin-bottom: 4px;
}
.form-input {
  width: 100%; padding: 7px 10px; font-size: 13px; font-family: inherit;
  border: 1px solid #dadce0; border-radius: 6px; background: #fff; color: #202124;
  transition: border-color .15s;
}
.form-input:focus {
  outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15);
}
.form-group { margin-bottom: 14px; }

.pw-hint { font-size: 12px; color: #80868b; margin-top: 4px; }

.btn-primary {
  width: 100%; background: #1a73e8; color: #fff; border: none; border-radius: 6px;
  padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-primary:hover:not(:disabled) { background: #1557b0; }
.btn-primary:disabled { background: #a8c7fa; cursor: not-allowed; }

.error-msg {
  background: #fce8e6; border: 1px solid #f5c6c2; border-radius: 6px;
  color: #d93025; font-size: 13px; padding: 8px 12px; margin-bottom: 14px; display: none;
}
.success-msg {
  background: #e6f4ea; border: 1px solid #b7dfbe; border-radius: 6px;
  color: #1e7e34; font-size: 13px; padding: 10px 14px; line-height: 1.5;
}
.invalid-msg {
  text-align: center; padding: 20px 0; color: #d93025; font-size: 14px;
}
.invalid-msg a { color: #1a73e8; text-decoration: none; }
.invalid-msg a:hover { text-decoration: underline; }

.loading { text-align: center; padding: 30px 0; color: #80868b; font-size: 13px; }

.back-link { margin-top: 14px; text-align: center; font-size: 13px; }
.back-link a { color: #1a73e8; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="login.html">← Sign In</a>
  <h1>Reset Password</h1>
</header>

<main>
  <div class="card">
    <div class="card-head">Set New Password</div>
    <div class="card-body" id="card-body">
      <div class="loading">Validating reset link…</div>
    </div>
  </div>
</main>

<script>
"use strict";

const params = new URLSearchParams(location.search);
const token  = params.get('token') || '';

async function init() {
    const body = document.getElementById('card-body');

    if (!token) {
        body.innerHTML = invalidHtml('No reset token provided.');
        return;
    }

    try {
        const r = await fetch('api.php?type=check-reset-token&token=' + encodeURIComponent(token))
            .then(r => r.json());
        if (!r.valid) {
            body.innerHTML = invalidHtml('This reset link has expired or already been used.');
            return;
        }
    } catch {
        body.innerHTML = invalidHtml('Could not validate reset link. Please try again.');
        return;
    }

    body.innerHTML = formHtml();
    document.getElementById('new-password').focus();
    document.getElementById('reset-form').addEventListener('submit', handleSubmit);
}

function invalidHtml(msg) {
    return '<div class="invalid-msg">' + esc(msg) + '<br><br>' +
           '<a href="forgot-password.html">Request a new reset link</a></div>';
}

function formHtml() {
    return '<form id="reset-form" autocomplete="on">' +
           '<div class="form-group">' +
           '<label class="form-label" for="new-password">New Password</label>' +
           '<input class="form-input" type="password" id="new-password" name="new-password"' +
           ' autocomplete="new-password" autofocus>' +
           '<div class="pw-hint">At least 8 characters</div>' +
           '</div>' +
           '<div class="form-group">' +
           '<label class="form-label" for="confirm-password">Confirm Password</label>' +
           '<input class="form-input" type="password" id="confirm-password" name="confirm-password"' +
           ' autocomplete="new-password">' +
           '</div>' +
           '<div class="error-msg" id="error-msg"></div>' +
           '<button class="btn-primary" type="submit" id="submit-btn">Set New Password</button>' +
           '</form>';
}

async function handleSubmit(e) {
    e.preventDefault();
    const btn       = document.getElementById('submit-btn');
    const errorMsg  = document.getElementById('error-msg');
    const newPw     = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;

    errorMsg.style.display = 'none';

    if (newPw.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters';
        errorMsg.style.display = 'block';
        return;
    }
    if (newPw !== confirmPw) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.style.display = 'block';
        document.getElementById('confirm-password').value = '';
        document.getElementById('confirm-password').focus();
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
        const r = await fetch('api.php?type=reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token, password: newPw}),
        }).then(r => r.json());

        if (r.ok) {
            document.getElementById('card-body').innerHTML =
                '<div class="success-msg">Your password has been updated. You can now sign in.</div>' +
                '<div class="back-link"><a href="login.html">Go to Sign In</a></div>';
        } else {
            errorMsg.textContent = r.error || 'Failed to reset password';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Set New Password';
        }
    } catch {
        errorMsg.textContent = 'Network error — please try again';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set New Password';
    }
}

function esc(s) {
    return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
