<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgot Password — ESCR Registry Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  background: #f1f3f4;
  color: #202124;
  min-height: 100vh;
}

header {
  background: #1a73e8;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
header a { color: #fff; text-decoration: none; font-size: 13px; opacity: 0.85; }
header a:hover { opacity: 1; text-decoration: underline; }
header h1 { font-size: 18px; font-weight: 600; }

main { max-width: 420px; margin: 60px auto; padding: 0 20px 80px; }

.card {
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
  overflow: hidden;
}
.card-head {
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: #5f6368; padding: 12px 20px; border-bottom: 1px solid #f1f3f4; background: #f8f9fa;
}
.card-body { padding: 20px; }

.hint {
  font-size: 13px; color: #5f6368; margin-bottom: 16px; line-height: 1.5;
}

.form-label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase; color: #5f6368; margin-bottom: 4px;
}
.form-input {
  width: 100%; padding: 7px 10px; font-size: 13px; font-family: inherit;
  border: 1px solid #dadce0; border-radius: 6px; background: #fff; color: #202124;
  transition: border-color .15s;
}
.form-input:focus {
  outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15);
}
.form-group { margin-bottom: 14px; }

.btn-primary {
  width: 100%; background: #1a73e8; color: #fff; border: none; border-radius: 6px;
  padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-primary:hover:not(:disabled) { background: #1557b0; }
.btn-primary:disabled { background: #a8c7fa; cursor: not-allowed; }

.success-msg {
  background: #e6f4ea; border: 1px solid #b7dfbe; border-radius: 6px;
  color: #1e7e34; font-size: 13px; padding: 10px 14px; line-height: 1.5;
}

.back-link { margin-top: 14px; text-align: center; font-size: 13px; }
.back-link a { color: #1a73e8; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="login.html">← Sign In</a>
  <h1>Forgot Password</h1>
</header>

<main>
  <div class="card">
    <div class="card-head">Reset Your Password</div>
    <div class="card-body" id="card-body">
      <p class="hint">Enter your username or email address and we'll send you a reset link if we have an account on file.</p>
      <form id="forgot-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="userinput">Username or email address</label>
          <input class="form-input" type="text" id="userinput" name="userinput"
                 autocomplete="username email" autofocus spellcheck="false" autocapitalize="off">
        </div>
        <button class="btn-primary" type="submit" id="submit-btn">Send Reset Link</button>
      </form>
      <div class="back-link"><a href="login.html">Back to Sign In</a></div>
    </div>
  </div>
</main>

<script>
"use strict";

document.getElementById('forgot-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const input = document.getElementById('userinput').value.trim();

    if (!input) return;

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
        await fetch('api.php?type=forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({usernameOrEmail: input}),
        });
    } catch {}

    // Always show the same message regardless of outcome
    document.getElementById('card-body').innerHTML =
        '<div class="success-msg">' +
        'If we have an account matching that username or email, a reset link has been sent.' +
        ' Please check your inbox (and spam folder).' +
        '</div>' +
        '<div class="back-link"><a href="login.html">Back to Sign In</a></div>';
});
</script>
</body>
</html>
